<!DOCTYPE html>
<html>
<body>
<h2>User Form</h2>
<input id="name" placeholder="Name">
<input id="age" placeholder="Age">
<button onclick="save()">Save</button>
<button onclick="load()">Load Users</button>
<pre id="out"></pre>
<script>
async function save(){
 await fetch('/addUser',{
 method:'POST',
 headers:{'Content-Type':'application/json'},
 body:JSON.stringify({name:name.value,age:age.value})
 });
 load();
}
async function load(){
 const d=await fetch('/getUsers').then(r=>r.json());
 out.textContent=JSON.stringify(d,null,2);
}
</script>
</body>
</html>
